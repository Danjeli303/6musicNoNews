name: Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Unit and audio validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install audio tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg make gcc

      - name: Run unit tests
        run: make test

      - name: Run audio validation tests
        run: make audio-test
